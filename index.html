{!d.emis.length?<Emp icon={II.emi} text="No EMIs"/>:d.emis.map(em=>{const ci=(em.entries||[]).findIndex(en=>en.mo===now.getMonth()&&en.yr===now.getFullYear());const ce=ci>=0?em.entries[ci]:null;const pct=em.total>0?((em.total-em.pending)/em.total)*100:0;
return<div key={em.id} style={{...cs.card,borderLeft:`3px solid ${em.pending===0?'var(--ok)':'#8b5cf6'}`}}>
<div style={cs.fb}><div><div style={{fontWeight:700}}>{em.name}</div><div style={{fontSize:11,color:'var(--txm)'}}>{fd(em.startDate)} &rarr; {fd(em.endDate)}</div></div><span style={{...cs.bd,background:em.pending===0?'rgba(52,211,153,.2)':'rgba(139,92,246,.15)',color:em.pending===0?'var(--ok)':'#8b5cf6'}}>{em.pending===0?String.fromCharCode(10003)+' Done':`${em.pending} left`}</span></div>
<div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,margin:'10px 0'}}><div><div style={{fontSize:9,color:'var(--txm)',textTransform:'uppercase'}}>Monthly</div><div style={{fontWeight:700,fontFamily:'var(--fm)'}}>{$(em.amount)}</div></div><div><div style={{fontSize:9,color:'var(--txm)',textTransform:'uppercase'}}>Total</div><div style={{fontWeight:700}}>{em.total}mo</div></div><div><div style={{fontSize:9,color:'var(--txm)',textTransform:'uppercase'}}>Paid</div><div style={{fontWeight:700,color:'var(--ok)'}}>{em.total-em.pending}</div></div></div>
<div style={{height:5,background:'var(--brd)',borderRadius:3,overflow:'hidden',marginBottom:8}}><div style={{height:'100%',width:`${pct}%`,background:em.pending===0?'var(--ok)':'#8b5cf6',borderRadius:3}}/></div>
<div style={{maxHeight:120,overflowY:'auto',marginBottom:8}}>{(em.entries||[]).map((en,i)=><div key={i} style={{...cs.fb,padding:'3px 6px',fontSize:11,borderRadius:4,marginBottom:1,background:en.paid?'rgba(52,211,153,.06)':'transparent'}}><span>{MS[en.mo]} {en.yr}</span><span style={{fontWeight:600,color:en.paid?'var(--ok)':'var(--txm)'}}>{en.paid?('✓ Paid '+$(en.pAmt)):'Pending'}</span></div>)}</div>
<div style={{display:'flex',gap:6}}>{ce&&!ce.paid&&<Bt onClick={()=>setSp({eid:em.id,idx:ci,name:em.name,amt:em.amount})} style={{fontSize:11}}>Pay This Month</Bt>}{ce&&ce.paid&&<span style={{...cs.bd,background:'rgba(52,211,153,.15)',color:'var(--ok)'}}>{String.fromCharCode(10003)+' This month'}</span>}<button onClick={()=>setEdItem(em)} style={{background:'none',border:'none',color:'var(--ac)',cursor:'pointer'}}>{II.ed}</button><button onClick={()=>dl('emis',em.id)} style={{background:'none',border:'none',color:'var(--txm)',cursor:'pointer'}}>{II.del}</button></div></div>})}
{sp&&<PayEMIMd info={sp} onClose={()=>setSp(null)}/>}{edItem&&<EditMd type='emis' item={edItem} onClose={()=>setEdItem(null)}/>}{showAdd&&<AddMd tab='emis' onClose={()=>setShowAdd(false)}/>}</div>}

function AddMd({tab,onClose}){const{d,aE,aEMI,aCC,aGr,aFS}=useA();const tm={expenses:'expense',creditCards:'cc',emis:'emi',groceries:'gro',fixedSpends:'fs'};const[ty,setTy]=useState(tm[tab]||'expense');const[f,sF]=useState({date:new Date().toISOString().split('T')[0],year:new Date().getFullYear(),month:new Date().getMonth()});const u=(k,v)=>sF(p=>({...p,[k]:v}));
const go=()=>{if(ty==='expense')aE({...f,type:'expense',paidViaBank:BNK(f.paymentMode)});else if(ty==='cc')aCC({cardNumber:f.cardNumber,bankName:f.ccBank,cardName:f.cardName||'',totalDue:Number(f.totalDue),minimumDue:Number(f.minimumDue),dueDate:f.dueDate,balanceAmount:Number(f.totalDue)});else if(ty==='emi')aEMI({name:f.name,amount:Number(f.amount),startDate:f.startDate,endDate:f.endDate,emiDate:f.emiDate});else if(ty==='gro')aGr({...f,type:f.gType||'bought'});else if(ty==='fs')aFS({...f,paidViaBank:BNK(f.paymentMode)});onClose()};
return<Md title="Add Expense" onClose={onClose}>
<Fl l="Type"><select value={ty} onChange={e=>setTy(e.target.value)} style={cs.select}><option value="expense">Other Expense</option><option value="cc">Credit Card</option><option value="emi">EMI</option><option value="gro">Grocery</option><option value="fs">Fixed Spend</option></select></Fl>
{ty==='expense'&&<><div style={cs.g2}><Fl l="Year"><select value={f.year} onChange={e=>u('year',Number(e.target.value))} style={cs.select}>{[2024,2025,2026,2027].map(y=><option key={y}>{y}</option>)}</select></Fl><Fl l="Month"><select value={f.month} onChange={e=>u('month',Number(e.target.value))} style={cs.select}>{MO.map((m,i)=><option key={i} value={i}>{m}</option>)}</select></Fl></div><Fl l="Date"><input type="date" value={f.date} onChange={e=>u('date',e.target.value)} style={cs.input}/></Fl><Fl l="Description"><input value={f.description||''} onChange={e=>u('description',e.target.value)} style={cs.input} placeholder="What?"/></Fl><Fl l="Category"><select value={f.category||''} onChange={e=>u('category',e.target.value)} style={cs.select}><option value="">Select</option>{d.settings.categories.map(c=><option key={c}>{c}</option>)}</select></Fl><Fl l="Amount"><input type="number" value={f.amount||''} onChange={e=>u('amount',e.target.value)} style={cs.input}/></Fl><Fl l="Payment Mode"><select value={f.paymentMode||''} onChange={e=>u('paymentMode',e.target.value)} style={cs.select}><option value="">Select</option>{d.settings.paymentMethods.map(p=><option key={p}>{p}</option>)}</select></Fl>{BNK(f.paymentMode)&&<Fl l="Bank"><select value={f.bankName||''} onChange={e=>u('bankName',e.target.value)} style={cs.select}><option value="">Select</option>{d.settings.banks.map(b=><option key={b}>{b}</option>)}</select></Fl>}</>}
{ty==='cc'&&<><Fl l="Select Card">{(d.settings.savedCards||[]).length>0?<select value={f.selectedCard||''} onChange={e=>{const v=e.target.value;if(v==='custom'){u('selectedCard','custom');u('ccBank','');u('cardNumber','');u('cardName','')}else{const sc=(d.settings.savedCards||[])[Number(v)];if(sc){u('selectedCard',v);u('ccBank',sc.bankName);u('cardNumber',sc.cardNumber);u('cardName',sc.cardName)}}}} style={cs.select}><option value="">Choose saved card</option>{(d.settings.savedCards||[]).map((sc,i)=><option key={i} value={i}>{sc.cardName||sc.bankName} - ****{(sc.cardNumber||'').slice(-4)}</option>)}<option value="custom">+ Enter manually</option></select>:<div style={{fontSize:11,color:'var(--txm)',marginBottom:8}}>No saved cards. Add in Settings or enter below.</div>}</Fl>{(f.selectedCard==='custom'||!(d.settings.savedCards||[]).length||f.selectedCard==='')&&<><Fl l="Bank Name"><select value={f.ccBank||''} onChange={e=>u('ccBank',e.target.value)} style={cs.select}><option value="">Select Bank</option>{d.settings.banks.map(b=><option key={b}>{b}</option>)}</select></Fl><Fl l="Card Number"><input value={f.cardNumber||''} onChange={e=>u('cardNumber',e.target.value)} style={cs.input} placeholder="XXXX XXXX XXXX XXXX"/></Fl></>}<div style={cs.g2}><Fl l="Total Due"><input type="number" value={f.totalDue||''} onChange={e=>u('totalDue',e.target.value)} style={cs.input}/></Fl><Fl l="Min Due"><input type="number" value={f.minimumDue||''} onChange={e=>u('minimumDue',e.target.value)} style={cs.input}/></Fl></div><Fl l="Due Date"><input type="date" value={f.dueDate||''} onChange={e=>u('dueDate',e.target.value)} style={cs.input}/></Fl></>}
{ty==='emi'&&<><Fl l="Name"><input value={f.name||''} onChange={e=>u('name',e.target.value)} style={cs.input} placeholder="e.g. Car Loan"/></Fl><Fl l="Monthly Amount"><input type="number" value={f.amount||''} onChange={e=>u('amount',e.target.value)} style={cs.input}/></Fl><div style={cs.g2}><Fl l="Start"><input type="date" value={f.startDate||''} onChange={e=>u('startDate',e.target.value)} style={cs.input}/></Fl><Fl l="End"><input type="date" value={f.endDate||''} onChange={e=>u('endDate',e.target.value)} style={cs.input}/></Fl></div><Fl l="EMI Date"><input type="date" value={f.emiDate||''} onChange={e=>u('emiDate',e.target.value)} style={cs.input}/></Fl></>}
{ty==='gro'&&<><Fl l="Type"><select value={f.gType||'bought'} onChange={e=>u('gType',e.target.value)} style={cs.select}><option value="bought">Bought</option><option value="needToBuy">Need to Buy</option></select></Fl><Fl l="Item"><input value={f.name||''} onChange={e=>u('name',e.target.value)} style={cs.input}/></Fl><div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}><Fl l="Qty"><input type="number" value={f.quantity||''} onChange={e=>u('quantity',e.target.value)} style={cs.input}/></Fl><Fl l="Unit"><select value={f.unit||''} onChange={e=>u('unit',e.target.value)} style={cs.select}><option value="">-</option><option value="kg">kg</option><option value="gm">gm</option><option value="liter">liter</option><option value="ml">ml</option><option value="pcs">pcs</option><option value="dozen">dozen</option></select></Fl><Fl l="Amount"><input type="number" value={f.amount||''} onChange={e=>u('amount',e.target.value)} style={cs.input}/></Fl></div><div style={cs.g2}><Fl l="Date"><input type="date" value={f.date} onChange={e=>u('date',e.target.value)} style={cs.input}/></Fl><Fl l="Expiry"><input type="date" value={f.expiryDate||''} onChange={e=>u('expiryDate',e.target.value)} style={cs.input}/></Fl></div></>}
{ty==='fs'&&<><Fl l="Category"><select value={f.category||''} onChange={e=>u('category',e.target.value)} style={cs.select}><option value="">Select</option>{d.settings.fixedCategories.map(c=><option key={c}>{c}</option>)}</select></Fl><Fl l="Amount"><input type="number" value={f.amount||''} onChange={e=>u('amount',e.target.value)} style={cs.input}/></Fl><Fl l="Date"><input type="date" value={f.date} onChange={e=>u('date',e.target.value)} style={cs.input}/></Fl><Fl l="Mode"><select value={f.paymentMode||''} onChange={e=>u('paymentMode',e.target.value)} style={cs.select}><option value="">Select</option>{d.settings.paymentMethods.map(p=><option key={p}>{p}</option>)}</select></Fl>{BNK(f.paymentMode)&&<Fl l="Bank"><select value={f.bankName||''} onChange={e=>u('bankName',e.target.value)} style={cs.select}><option value="">Select</option>{d.settings.banks.map(b=><option key={b}>{b}</option>)}</select></Fl>}</>}
<div style={{display:'flex',gap:8,marginTop:4}}><Bt onClick={go} style={{flex:1,justifyContent:'center'}}>Save</Bt><Bt v="secondary" onClick={onClose}>Cancel</Bt></div></Md>}

function Expenses(){const{d,dl}=useA();const[tp,setTp]=useState('expDash');const[show,setShow]=useState(false);const[fy,setFy]=useState(new Date().getFullYear());const[fm,setFm]=useState(new Date().getMonth());const[sp,setSp]=useState(null);const[sp2,setSp2]=useState(null);const[edItem,setEdItem]=useState(null);const now=new Date();
const tabs=[{id:'expDash',l:'Dashboard'},{id:'expenses',l:'Other'},{id:'creditCards',l:'Credit Card'},{id:'emis',l:'EMI'},{id:'groceries',l:'Grocery'},{id:'fixedSpends',l:'Fixed Spend'}];
return<div><div style={{...cs.fb,marginBottom:16}}><h2 style={{fontSize:20,fontWeight:700}}>Expenses</h2><Bt onClick={()=>setShow(true)}>{II.plus} Add</Bt></div>
<div style={{display:'flex',gap:8,marginBottom:14}}><select value={fy} onChange={e=>setFy(Number(e.target.value))} style={{...cs.select,width:85}}>{[2024,2025,2026,2027].map(y=><option key={y}>{y}</option>)}</select><select value={fm} onChange={e=>setFm(Number(e.target.value))} style={{...cs.select,width:120}}>{MO.map((m,i)=><option key={i} value={i}>{m}</option>)}</select></div>
<div style={{display:'flex',gap:3,marginBottom:16,overflowX:'auto'}}>{tabs.map(t=><button key={t.id} onClick={()=>setTp(t.id)} style={{...cs.btn,padding:'6px 12px',fontSize:12,whiteSpace:'nowrap',background:tp===t.id?'var(--ac)':'var(--inp)',color:tp===t.id?'#fff':'var(--tx2)'}}>{t.l}</button>)}</div>
{tp==='expDash'&&(()=>{
const cur=d.settings.currency||'\u20B9';
const allE=d.expenses.filter(e=>{const x=new Date(e.date);return x.getMonth()===fm&&x.getFullYear()===fy});
const allF=d.fixedSpends.filter(f=>{const x=new Date(f.date);return x.getMonth()===fm&&x.getFullYear()===fy});
const allG=d.groceries.filter(g=>g.type==='bought'&&new Date(g.date).getMonth()===fm&&new Date(g.date).getFullYear()===fy);
const emiE=d.emis.flatMap(em=>(em.entries||[]).filter(en=>en.mo===fm&&en.yr===fy));
const ccMinT=d.creditCards.filter(c=>!c.isPaid).reduce((s,c)=>s+Number(c.minimumDue||0),0);
const tOther=allE.reduce((s,e)=>s+Number(e.amount),0);
const tFixed=allF.reduce((s,f)=>s+Number(f.amount),0);
const tGro=allG.reduce((s,g)=>s+Number(g.amount),0);
const tEmi=emiE.reduce((s,e)=>s+Number(e.amount),0);
const grand=tOther+tFixed+tGro+tEmi;
const catData={};allE.forEach(e=>{const c=e.category||'Other';catData[c]=(catData[c]||0)+Number(e.amount)});
allF.forEach(f=>{const c='Fixed: '+(f.category||'Other');catData[c]=(catData[c]||0)+Number(f.amount)});
const catArr=Object.entries(catData).sort((a,b)=>b[1]-a[1]);
const palette=['#6366f1','#ec4899','#f97316','#8b5cf6','#0ea5e9','#22c55e','#eab308','#ef4444','#14b8a6','#f43f5e','#a855f7','#3b82f6'];
const segs=catArr.map(([k,v],i)=>({l:k,a:v,c:palette[i%palette.length]}));
const allSegs=[...segs,{l:'EMIs',a:tEmi,c:'#8b5cf6'},{l:'CC Min Due',a:ccMinT,c:'#f97316'}].filter(x=>x.a>0);
const segTotal=allSegs.reduce((s,x)=>s+x.a,0);
let accAngle=0;
return<div>
<div style={{...cs.card,textAlign:'center'}}><div style={{fontSize:10,fontWeight:700,color:'var(--txm)',textTransform:'uppercase'}}>Total Expenses - {MO[fm]} {fy}</div><div style={{fontSize:28,fontWeight:700,fontFamily:'var(--fm)',color:'var(--err)',marginTop:4}}>{$(grand,cur)}</div>{ccMinT>0&&<div style={{fontSize:12,color:'#f97316',fontWeight:600,marginTop:2}}>+ CC Min Due: {$(ccMinT,cur)}</div>}</div>
<div style={cs.card}><div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',color:'var(--tx2)',marginBottom:14}}>Expense Distribution</div>
<div style={{display:'flex',justifyContent:'center',marginBottom:16}}><svg width="180" height="180" viewBox="0 0 180 180">{(()=>{if(allSegs.length===0)return<circle cx="90" cy="90" r="70" fill="none" stroke="var(--brd)" strokeWidth="24"/>;let cum=0;return allSegs.map((seg,i)=>{const pct=seg.a/segTotal;const startA=cum*2*Math.PI-Math.PI/2;cum+=pct;const endA=cum*2*Math.PI-Math.PI/2;const large=pct>0.5?1:0;const r=70;const x1=90+r*Math.cos(startA);const y1=90+r*Math.sin(startA);const x2=90+r*Math.cos(endA);const y2=90+r*Math.sin(endA);if(pct>=0.999)return<circle key={i} cx="90" cy="90" r={r} fill="none" stroke={seg.c} strokeWidth="24"/>;return<path key={i} d={`M${x1},${y1}A${r},${r},0,${large},1,${x2},${y2}`} fill="none" stroke={seg.c} strokeWidth="24" strokeLinecap="round"/>})})()}<text x="90" y="85" textAnchor="middle" style={{fontSize:14,fontWeight:700,fill:'var(--tx)'}}>{$(segTotal,cur)}</text><text x="90" y="102" textAnchor="middle" style={{fontSize:9,fill:'var(--txm)'}}>Total</text></svg></div>
{allSegs.map((seg,i)=>{const pct=segTotal>0?(seg.a/segTotal*100):0;return<div key={i} style={{marginBottom:8}}><div style={{...cs.fb,marginBottom:2}}><div style={{display:'flex',alignItems:'center',gap:6}}><div style={{width:10,height:10,borderRadius:3,background:seg.c,flexShrink:0}}/><span style={{fontSize:12,fontWeight:500}}>{seg.l}</span></div><span style={{fontFamily:'var(--fm)',fontWeight:700,fontSize:12}}>{$(seg.a,cur)}</span></div><div style={{height:4,background:'var(--brd)',borderRadius:2,overflow:'hidden'}}><div style={{height:'100%',width:`${pct}%`,background:seg.c,borderRadius:2}}/></div><div style={{fontSize:9,color:'var(--txm)',marginTop:1}}>{pct.toFixed(1)}%</div></div>})}</div>
<div style={cs.card}><div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',color:'var(--tx2)',marginBottom:12}}>By Category</div>
{catArr.length===0?<div style={{fontSize:12,color:'var(--txm)',textAlign:'center',padding:12}}>No expenses</div>:catArr.map(([cat,amt],i)=><div key={i} style={{...cs.fb,padding:'6px 0',borderBottom:'1px solid var(--brd)'}}><div style={{display:'flex',alignItems:'center',gap:6}}><div style={{width:8,height:8,borderRadius:'50%',background:palette[i%palette.length]}}/><span style={{fontSize:12}}>{cat}</span></div><span style={{fontFamily:'var(--fm)',fontWeight:600,fontSize:12}}>{$(amt,cur)}</span></div>)}</div>
{d.creditCards.filter(c=>!c.isPaid).length>0&&<div style={cs.card}><div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',color:'var(--tx2)',marginBottom:12}}>Credit Card Min Due</div>{d.creditCards.filter(c=>!c.isPaid).map(c=><div key={c.id} style={{...cs.fb,padding:'6px 0',borderBottom:'1px solid var(--brd)'}}><div><div style={{fontWeight:600,fontSize:12}}>{c.cardName||('****'+(c.cardNumber||'').slice(-4))}</div><div style={{fontSize:10,color:'var(--txm)'}}>{c.bankName}</div></div><div style={{textAlign:'right'}}><div style={{fontFamily:'var(--fm)',fontWeight:700,color:'#f97316',fontSize:13}}>{$(c.minimumDue,cur)}</div><CCBadge c={c}/></div></div>)}<div style={{...cs.fb,paddingTop:8,borderTop:'1px solid var(--brd)',marginTop:4}}><span style={{fontWeight:700,fontSize:12}}>Total Min Due</span><span style={{fontFamily:'var(--fm)',fontWeight:700,fontSize:14,color:'#f97316'}}>{$(ccMinT,cur)}</span></div></div>}
</div>})()}
{tp==='expenses'&&(()=>{const f=d.expenses.filter(e=>{const x=new Date(e.date);return x.getMonth()===fm&&x.getFullYear()===fy});return!f.length?<Emp icon={II.exp} text="No expenses"/>:f.map(e=><div key={e.id} style={{...cs.card,...cs.fb}}><div><div style={{fontWeight:600}}>{e.description||e.category}</div><div style={{fontSize:10,color:'var(--txm)'}}>{fd(e.date)} &middot; {e.paymentMode||'Cash'}{e.bankName?` &middot; ${e.bankName}`:''}</div></div><div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontFamily:'var(--fm)',fontWeight:700,color:'var(--err)'}}>-{$(e.amount)}</span><button onClick={()=>setEdItem({type:'expenses',item:e})} style={{background:'none',border:'none',color:'var(--ac)',cursor:'pointer'}}>{II.ed}</button><button onClick={()=>dl('expenses',e.id)} style={{background:'none',border:'none',color:'var(--txm)',cursor:'pointer'}}>{II.del}</button></div></div>)})()}
